# Rules that are set for removal have not been included
rules:
  000-US-spellcheck:
    cases:
      - id: misspell
        filetypes: [md, rst]
        content: |
          This Frist wrod has someting incorrect.
        expect:
          triggers:
            - Frist
            - wrod
            - someting
          severity: error
      - id: ignore-rst
        filetypes: [rst]
        content: |
          Ignore the :vale-ignore:`splelling` mistake.
        expect:
          triggers: []
          severity: error
      - id: ignore-md
        filetypes: [md]
        content: |
          Ignore the {vale-ignore}`splelling` mistake.
        expect:
          triggers: []
          severity: error
  003-Ubuntu-names-versions:
    cases:
      - id: ubuntu-names-md
        filetypes: [md]
        content: |
          Ubuntu 24.04 has been released
          Ubuntu 23.10 LTS is codenamed Mantic Minotaur
          Ubuntu 24.04 LTS (Numbat)
          How to download Ubuntu 22.04
          Installed version is Ubuntu 18.10 (Cuttlefish)

          ## Ubuntu 21.10 LTS

          | Cycle  | OS                          |
          |--------|-----------------------------|
          | 22.04  | Ubuntu 22.04 LTS (Jimmy)    |
          | 22.04  | Ubuntu 22.04 (Kinetic Kudu) |
        expect:
          triggers:
            - 'Ubuntu 18.10 ('
            - 'Ubuntu 21.10 LTS'
            - 'Ubuntu 22.04'
            - 'Ubuntu 22.04'
            - 'Ubuntu 22.04 LTS ('
            - 'Ubuntu 23.10 LTS'
            - 'Ubuntu 24.04'
            - 'Ubuntu 24.04 LTS ('
          severity: error
      - id: valid-md
        filetypes: [md]
        content: |
          Ubuntu 24.04 LTS
          Ubuntu 24.04 LTS (Noble)
          Ubuntu 24.04 LTS (Noble Numbat)

          ## Ubuntu 24.04 LTS

          | Cycle  | OS                          |
          |--------|-----------------------------|
          | 22.04  | Ubuntu 22.04 LTS (Jammy)    |
          | 22.10  | Ubuntu 22.10 (Kinetic Kudu) |
        expect:
          triggers: []
          severity: error
  004-Canonical-product-names: # Not currently working for multi-word terms
    cases:
      - id: canonical-product-names
        filetypes: [md, rst]
        content: |
          It's Anbox Cloud, not Anbox cloud or AnBox.
          We say Charmed Kubeflow not charmed kubeflow.
          The Canonical Observability Stack is called COS and is not
          a Canonical observability stack.
          Juju, never JuJu, nor juju when not referring to the command `juju`.
          Landscape and Launchpad, not LandScape or LaunchPad.
          If you say lxd it should be in backticks `lxd`.
          For the love of all that is holy, MAAS, not Maas or MaaS.
          MicroCeph and MicroCloud, not Microceph or Microcloud.
          MicroK8s, not Microk8s.
          MicroOVN, not microOVN or MicroOvn.
          MicroStack is the name, not microstack or Microstack.
          Mir doesn't have a common misspelling.
          Multipass, like in that film, not MultiPass.
          Snapcraft, not SnapCraft or snapcraft.
          snapd not snapD or SnapD or Snapd.
          Ubuntu Pro, not Ubuntu pro.
          Ubuntu Server, though I guess people may talk about *an*
          Ubuntu server, but that should prompt a query. 
        expect:
          triggers:
            - cloud
            - AnBox
            - charmed
            - kubeflow
            - observability stack
            - JuJu
            - juju
            - LandScape
            - LaunchPad
            - lxd
            - Maas
            - MaaS
            - Microceph
            - Microcloud
            - Microk8s
            - microOVN
            - MicroOvn
            - microstack
            - Microstack
            - MultiPass
            - SnapCraft
            - snapcraft
            - snapD
            - SnapD
            - pro
          severity: error
  005-Industry-product-names:
    cases:
      - id: valid
        filetypes: [md, rst]
        content: |
            nVidia should be 'NVIDIA'
            Openstack should be 'OpenStack'
            Postgresql should be 'PostgreSQL'
            Kuberentes should be 'Kubernetes' 
            Aws should be 'AWS' 
            Mysql should be 'MySQL' 
            docker should be 'Docker' 
            KubeFlow should be 'Kubeflow'
            Google cloud platform should be 'Google Cloud Platform'
            Google cloud should be 'Google Cloud Platform'
            Influxdb should be 'InfluxDB' 
            mattermost should be 'Mattermost'
        expect:
          triggers:
            - nVidia
            - Openstack
            - Postgresql
            - Kuberentes
            - Aws
            - Mysql
            - docker
            - KubeFlow
            - Google cloud platform
            - Google cloud
            - Influxdb
            - mattermost
          severity: warning
  006-Contractions-forbidden:
    cases:
      - id: contractions-forbidden
        filetypes: [md, rst]
        content: |
          This ain't a sentence that you want to read in documentation.
          How'd you feel yesterday?
          How'll you feel tomorrow?
          I'd expect that this sentence will not pass quality checks.
          Something's off with this sentence.
          This sentence mayn't pass inspection.
          Our checks may've backfired.
          This sentence mightn't pass inspection.
          Our checks might've backfired.
          We're gonna have to change some sentences.
          We gotta make changes to the documentation.
          We will make the changes at 10 o'clock.
        expect:
          triggers:
            - ain't
            - How'd
            - How'll
            - I'd
            - Something's
            - mayn't
            - may've
            - mightn't
            - might've
            - gonna
            - gotta
            - o'clock
          severity: warning
  # 007-Headings-sentence-case:
  #   cases:
  #     - id: valid
  #       filetypes: [md, rst]
  #       content:
  #       expect:
  #         triggers:
  #         severity:
  008-Headings-no-period:
    cases:
      - id: MD-headings
        filetypes: [md]
        content: |
          # This is a heading.
          ## Another heading!
          ### Yet another heading?
          #### Heading without punctuation
        expect:
          triggers:
            - '.'
            - '!'
            - '?'
          severity: suggestion
      - id: RST-headings
        filetypes: [rst]
        content: |
          Some heading.
          *************

          Another heading!
          ################

          Yet another heading?
          ********************

          Heading without punctuation
          ###########################
        expect:
          triggers:
            - '.'
            - '!'
            - '?'
          severity: suggestion
  # 009-Headings-no-links:
  #   cases:
  #     - id: valid
  #       filetypes: [md, rst]
  #       content:
  #       expect:
  #         triggers:
  #         severity:
  010-Punctuation-double-spaces:
    cases:
      - id: valid
        filetypes: [md, rst]
        content: |
          Two spaces after a sentence.  Is fine if it isn't EOL.
          Two spaces after EOL is bad.  
          This will be fine though.
          How about this?  
          This is also bad!  
          And this is fine?
        expect:
          triggers:
            - '.  '
            - '?  '
            - '!  '
          severity: warning
  # 012-Date-format:
  #   cases:
  #     - id: valid
  #       filetypes: [md, rst]
  #       content:
  #       expect:
